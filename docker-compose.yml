services:
  api:
    build: .
    container_name: incident-commander-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://commander:commander@postgres:5432/incident_commander
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      ENABLE_NEO4J: "true"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: incidentcommander
      ENABLE_OPENSEARCH: "true"
      USE_CELERY: "true"
      OPENSEARCH_HOST: opensearch
      OPENSEARCH_PORT: "9200"
      OPENSEARCH_USER: admin
      OPENSEARCH_PASSWORD: admin
      OPENSEARCH_SSL: "false"
    depends_on:
      - postgres
      - redis
      - neo4j
      - opensearch
    volumes:
      - ./data:/app/data

  worker:
    build: .
    container_name: incident-commander-worker
    command: celery -A app.worker.celery_app worker --loglevel=INFO
    environment:
      DATABASE_URL: postgresql+psycopg2://commander:commander@postgres:5432/incident_commander
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      ENABLE_NEO4J: "true"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: incidentcommander
      ENABLE_OPENSEARCH: "true"
      OPENSEARCH_HOST: opensearch
      OPENSEARCH_PORT: "9200"
      OPENSEARCH_USER: admin
      OPENSEARCH_PASSWORD: admin
      OPENSEARCH_SSL: "false"
    depends_on:
      - postgres
      - redis
      - neo4j
      - opensearch
    volumes:
      - ./data:/app/data

  postgres:
    image: postgres:16-alpine
    container_name: incident-commander-postgres
    environment:
      POSTGRES_DB: incident_commander
      POSTGRES_USER: commander
      POSTGRES_PASSWORD: commander
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: incident-commander-redis
    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:5-community
    container_name: incident-commander-neo4j
    environment:
      NEO4J_AUTH: neo4j/incidentcommander
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  opensearch:
    image: opensearchproject/opensearch:2
    container_name: incident-commander-opensearch
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: admin
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data

volumes:
  postgres_data:
  neo4j_data:
  opensearch_data:
